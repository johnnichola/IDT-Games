<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME PAGE</title>
    <!-- Bootstrap 5.3.8 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/x-icon" href="assets/logo/Secondary-White-Big.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-2" data-bs-spy="scroll" data-bs-target="#navbarNav" data-bs-offset="50" style="background-color: #c6c4c4">

    <nav class="navbar navbar-expand-lg shadow-lg z-3 sticky-top" style="background-color: #c6c4c4; height: 72px">
        <div class="container">
            <a class="navbar-brand" href="#">
                <img src="assets/logo/Main_no-sub.png" style="width: 100px; height: auto">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav w-100">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">
                            HOME
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">FAQ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">ABOUT</a>
                    </li>
                    <li class="nav-item ms-auto flex-row d-flex align-items-center">
                        <img src="assets/elements/coin.png" style="width: 50px;">
                        <h1 id="gold-count" style="color: #3b3b3b" class="fw-bold fs-3">999</h1>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- HERO SECTION -->
    <div class="position-relative w-100" style="height: calc(100vh - 72px);">
        <div class="container h-100 position-relative overflow-hidden">
            <picture>
                <source srcset="assets/hero_page.png" media="(min-width: 768px)">
                <img src="assets/hero_page_mobile.png" style="height: auto; object-position: top;" class="d-block w-100 object-fit-fill">
            </picture>

            <button style="top:90%; width: 100px; height: auto"class=" btn bg-transparent border-0 shadow-none position-absolute start-50 translate-middle d-flex justify-content-center align-items-center flex-column">
                <h1 class="fs-3 fw-bold text-white" style="width: 500px; -webkit-text-stroke: 1px black; color: transparent;">EXPLORE MORE</h1>
                <img src="assets/elements/drop_arrow_white_outline.png" style="width: 100%; height: auto">
            </button>
        </div>
    </div>

    <!-- ITEM TILE SECTION -->
    <div class="py-5">

        <!-- Action Games -->
        <div class="container mt-5">
            <h1 class="fs-3 fw-bold" style="color: #3b3b3b">Action Games</h1>
        </div>

        <div class="container text-center">
            <div class="row gx-3 gy-4" style="color: #3b3b3b">
                <div class="col-6 col-md-4">
                    <div style="background-color: #92929200;">
                        <div class="w-100 h-auto">
                            <a href="https://thewickedproduction.com/games/blackjack/" class="w-100 h-100">
                                <img src="assets/card thumbnails/blackjack_card.png" class="rounded-4 w-100 h-auto object-fit-contain">
                            </a>
                        </div>
                        <div class="fw-bold d-flex align-items-start">
                            IDT Blackjack
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div style="background-color: #92929200;">
                        <div class="w-100 h-auto">
                            <a href="https://thewickedproduction.com/games/clicker/" class="w-100 h-100">
                                <img src="assets/card thumbnails/idle_clicker_card.png" class="rounded-4 w-100 h-auto object-fit-contain">
                            </a>
                        </div>
                        <div class="fw-bold d-flex align-items-start">
                            Idle Clicker
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div style="background-color: #92929200;">
                        <div class="w-100 h-auto">
                            <img src="assets/carousel/blackjack_hero.png" class="rounded-4 w-100 h-auto object-fit-contain">
                        </div>
                        <div class="fw-bold d-flex align-items-start">
                            WIP Game
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reaction Games -->
        <div class="container mt-5">
            <h1 class="fs-3 fw-bold" style="color: #3b3b3b">Reaction Games</h1>
        </div>

        <div class="container text-center">
            <div class="row gx-3 gy-4" style="color: #3b3b3b">
                <div class="col-6 col-md-4">
                    <div style="background-color: #92929200;">
                        <div class="w-100 h-auto">
                            <a href="https://thewickedproduction.com/games/aim/" class="w-100 h-100">
                                <img src="assets/card thumbnails/aim_card.png" class="rounded-4 w-100 h-auto object-fit-contain">
                            </a>
                        </div>
                        <div class="fw-bold d-flex align-items-start">
                            Aim Trainer
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div style="background-color: #92929200;">
                        <div class="w-100 h-auto">
                            <a href="https://thewickedproduction.com/games/reaction/" class="w-100 h-100">
                                <img src="assets/card thumbnails/react_card.png" class="rounded-4 w-100 h-auto object-fit-contain">
                            </a>
                        </div>
                        <div class="fw-bold d-flex align-items-start">
                            React Fast!
                        </div>
                    </div>
                </div>
                <div class="col">
                    <div style="background-color: #92929200;">
                        <div class="w-100 h-auto">
                            <img src="assets/card thumbnails/guess_card.png" class="rounded-4 w-100 h-auto object-fit-contain">
                        </div>
                        <div class="fw-bold d-flex align-items-start">
                            Guess The Number
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- GACHA SECTION -->
    <div class="container position-relative w-100">
        <div class="container h-100 position-relative">
            <picture>
                <source srcset="assets/gacha_page.png" media="(min-width: 768px)">
                <img src="assets/gacha_page_mobile.png" class="rounded-4 d-block w-100 h-100 object-fit-contain">
            </picture>
            <!-- <img src="assets/gacha_page.png" class="rounded-4 d-block w-100 h-100 object-fit-contain"> -->
        </div>
    </div>

    <!-- FOOTER -->

            <div class="col-md-4 d-flex align-items-center">
                <a href="#" class="mb-3 mb-md-0 text-body-secondary text-decoration-none 1h-1" aria-label="Bootstrap">
                    <img src="assets/logo/Main_no-sub.png" style="width: 80px; height: auto">
                </a>
                <span class="mb-3 mb-md-0 text-body-secondary">© 2026 IDT Games, Inc</span>
            </div>
            <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
                <li class="ms-3">
                    <a class="text-body-secondary" href="#" aria-label="Instagram">
                        <img src="assets/elements/instagram.png" style="width: 50px; height: auto">
                    </a>
                </li>
                <li class="ms-3">
                    <a class="text-body-secondary" href="#" aria-label="Facebook">
                        <img src="assets/elements/facebook.png" style="width: 50px; height: auto">
                    </a>
                </li>
            </ul>
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
