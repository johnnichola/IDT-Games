<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <!-- Bootstrap 5.3.8 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
    <div class="center-container">
        <!-- <div class="top-left d-flex flex-column align-items-center justify-content-center">
            <h3 id="gold-text">Gold: 500</h3>
            <button id="bet1" class="bet-btn" onclick="onBet(100)"></button>
            <button id="bet2" class="bet-btn" onclick="onBet(200)"></button>
            <button id="bet3" class="bet-btn" onclick="onBet(500)"></button>
            <button id="bet4" class="bet-btn" onclick="onBet(1000)"></button>
        </div> -->
        <div class="top-right">
            <div id="dealer-card-container" class="bottom-container"></div>
            <h2 id="dealer-card-count" class="text-white">0</h2>

            <h1 id="game-state">------------</h1>
            <button id="start-button" class="btn btn-warning fw-bold text-white" onclick="startGame()">
                NEW GAME
            </button>

            <h2 id="player-card-count" class="text-white">0</h2>
            <div id="player-card-container" class="bottom-container"></div>
        </div>
        <div class="bottom-left"></div>
        <div class="bottom-right">
            <div id="bet-group">
                <h3 id="gold-text">Gold: 500</h3>
                <button id="bet1" class="bet-btn" onclick="onBet(100)"></button>
                <button id="bet2" class="bet-btn" onclick="onBet(200)"></button>
                <button id="bet3" class="bet-btn" onclick="onBet(500)"></button>
                <button id="bet4" class="bet-btn" onclick="onBet(1000)"></button>
            </div>
            <div id="action-group" class="d-none">
                <button id="hit-btn" class="main-btn" onclick="onHit()"></button>
                <button id="stand-btn" class="main-btn" onclick="onStand()"></button>
            </div>
            </div>
        </div>
        <p>v0.0.8</p>
    </div>
    <img src="assets/cards/back_card.png" id="customCursor">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
