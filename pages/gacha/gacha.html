<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha!</title>
    <!-- Bootstrap 5.3.8 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../styles.css" type="text/css">
</head>
<body style="background-color: #420f4c">

    <div style="height: 90vh" class="w-100 d-flex flex-column justify-content-center align-items-center">
        
        <section id="chest-section" class="position-relative flex-column w-100 h-100 d-flex justify-content-center align-items-center">
            <h1 class="fw-bold text-white m-4">Gacha</h1>
            <button id="chest-button" class="btn btn-link text-decoration-none">
                <div id="chest-sprite" class="chest-sprite"></div>
            </button>
            
            <div id="white-flash" style="height: 100vh; width: 100vw;" class="position-absolute bg-white d-none"></div>
        </section>
        
        <section id="card-section" class="w-100 d-flex flex-column justify-content-center align-items-center gap-4 d-none">
            <h1 class="fw-bold text-white m-4">Pick a card!</h1>
            <div id="cards" class="w-100 d-flex justify-content-center align-items-center gap-4">
                <div style="width: 307px; height: auto">
                    <img src="../blackjack/assets/cards/back_card.png" class="w-100 h-100">
                </div>
                <div style="width: 307px; height: auto">
                    <img src="../blackjack/assets/cards/back_card.png" class="w-100 h-100">
                </div>
                <div style="width: 307px; height: auto">
                    <img src="../blackjack/assets/cards/back_card.png" class="w-100 h-100">
                </div>
                <div style="width: 307px; height: auto">
                    <img src="../blackjack/assets/cards/back_card.png" class="w-100 h-100">
                </div>
            </div>
        </section>

        <section id="card-reveal-section" class="w-100 d-flex flex-column justify-content-center align-items-center d-none">
            <div style="width: 307px; height: auto">
                <img id="chosen-card" src="../blackjack/assets/cards/back_card.png" class="w-100 h-100">
            </div>
            <h1 id="card-rarity-type" class="text-white d-none">Common</h1>
            <button id="reset-button" class="btn btn-warning d-none">Open another</button>
        </section>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Anime JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
