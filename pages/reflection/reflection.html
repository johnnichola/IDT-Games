<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reflection</title>
    <!-- Animate css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Bootstrap 5.3.8 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="p-2" style="background-color: #c6c4c4">
    <div id="nav-placement"></div>

    <section>
        <div class="position-relative w-100" style="height: calc(100vh - 72px);">
            <div class="container h-100 position-relative">
                <h1 style="font-size: 100px;"
                    class="animate__animated animate__backInDown">
                    My<br>Reflection
                </h1>

                <div class="overflow-auto border border-5 border-dark rounded-4 w-100 h-50 p-2">
                    <p id="reflection-text" style="font-size: 20px">
                    </p>
                </div>
            </div>
        </div>
    </section>
    <script type="module">
        import * as Main from '/main.js';
        fetch('../../navbar.html')
        .then(res => res.text())
        .then(data => 
        {
            document.getElementById("nav-placement").innerHTML = data;     

            const goldElem = document.getElementById("gold-count");
            if(goldElem) // Check if gold element exists
            {
                goldElem.textContent = Main.getGold();
            } 
        });

        fetch('../../reflection.txt')
            .then(res => res.text())
            .then(data => 
                {
                    document.getElementById("reflection-text").innerHTML = data;
                }
            )
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
