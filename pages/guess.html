<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess!</title>
    <!-- Bootstrap 5.3.8 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-primary">

    <div class="d-flex w-100 flex-column align-items-center justify-content-center">
        <h1 class="text-white fw-bold">Guess the number!</h1>
        <div style="width: 250px" class="input-group">   
            <input id="guess-input" type="text" class="form-control" placeholder="enter your number" aria-label="Username" aria-describedby="basic-addon1">
        </div>
        <h2 id="guess-count" class="text-white">Guess: 0</h2>
        <h2 id="guess-alert" class="text-white"></h2>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../script.js"></script>
</body>
</html>
